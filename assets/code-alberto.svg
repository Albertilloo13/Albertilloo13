<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 212" width="460" height="212" xml:space="preserve">
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, Menlo, monospace; font-size: 13px; }
    .ln { fill: #484f58; }
    .kw { fill: #ff7b72; }
    .id { fill: #c9d1d9; }
    .pr { fill: #79c0ff; }
    .st { fill: #a5d6ff; }
    .pu { fill: #c9d1d9; }
    .file { fill: #8b949e; font-size: 12px; }
    .cover { fill: #0d1117; transform-box: fill-box; transform-origin: right center; }
    .c1 { animation: t1 12s infinite; }
    .c2 { animation: t2 12s infinite; }
    .c3 { animation: t3 12s infinite; }
    .c4 { animation: t4 12s infinite; }
    .c5 { animation: t5 12s infinite; }
    .c6 { animation: t6 12s infinite; }
    .c7 { animation: t7 12s infinite; }
    .cursor { fill: #58a6ff; animation: blink 1.1s steps(2, start) infinite; }
    @keyframes t1 { 0%, 3%  { transform: scaleX(1); animation-timing-function: steps(17, end); } 9%, 100%  { transform: scaleX(0); } }
    @keyframes t2 { 0%, 11% { transform: scaleX(1); animation-timing-function: steps(30, end); } 21%, 100% { transform: scaleX(0); } }
    @keyframes t3 { 0%, 23% { transform: scaleX(1); animation-timing-function: steps(23, end); } 31%, 100% { transform: scaleX(0); } }
    @keyframes t4 { 0%, 33% { transform: scaleX(1); animation-timing-function: steps(33, end); } 43%, 100% { transform: scaleX(0); } }
    @keyframes t5 { 0%, 45% { transform: scaleX(1); animation-timing-function: steps(36, end); } 57%, 100% { transform: scaleX(0); } }
    @keyframes t6 { 0%, 59% { transform: scaleX(1); animation-timing-function: steps(16, end); } 65%, 100% { transform: scaleX(0); } }
    @keyframes t7 { 0%, 67% { transform: scaleX(1); animation-timing-function: steps(2, end); }  70%, 100% { transform: scaleX(0); } }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
  </style>

  <!-- Ventana del editor -->
  <rect x="1" y="1" width="458" height="210" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <path d="M1 34 h458" stroke="#21262d" stroke-width="1"/>
  <circle cx="22" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="18" r="6" fill="#27c93f"/>
  <text x="230" y="22" text-anchor="middle" class="file">alberto.ts</text>

  <!-- Números de línea -->
  <text x="22" y="60"  class="ln">1</text>
  <text x="22" y="80"  class="ln">2</text>
  <text x="22" y="100" class="ln">3</text>
  <text x="22" y="120" class="ln">4</text>
  <text x="22" y="140" class="ln">5</text>
  <text x="22" y="160" class="ln">6</text>
  <text x="22" y="180" class="ln">7</text>

  <!-- Código -->
  <text x="42" y="60"><tspan class="kw">const</tspan><tspan class="id"> alberto </tspan><tspan class="kw">=</tspan><tspan class="pu"> {</tspan></text>
  <text x="42" y="80"><tspan class="pr">  rol</tspan><tspan class="pu">: </tspan><tspan class="st">"Full Stack Developer"</tspan><tspan class="pu">,</tspan></text>
  <text x="42" y="100"><tspan class="pr">  empresa</tspan><tspan class="pu">: </tspan><tspan class="st">"NEXOporte"</tspan><tspan class="pu">,</tspan></text>
  <text x="42" y="120"><tspan class="pr">  docente</tspan><tspan class="pu">: </tspan><tspan class="st">"Algorithmics Cuenca"</tspan><tspan class="pu">,</tspan></text>
  <text x="42" y="140"><tspan class="pr">  stack</tspan><tspan class="pu">: [</tspan><tspan class="st">"TS"</tspan><tspan class="pu">, </tspan><tspan class="st">"Python"</tspan><tspan class="pu">, </tspan><tspan class="st">"Docker"</tspan><tspan class="pu">],</tspan></text>
  <text x="42" y="160"><tspan class="pr">  saas</tspan><tspan class="pu">: </tspan><tspan class="st">"GymOS"</tspan><tspan class="pu">,</tspan></text>
  <text x="42" y="180"><tspan class="pu">};</tspan></text>

  <!-- Cubiertas que se retiran simulando la escritura -->
  <rect class="cover c1" x="40" y="46"  width="340" height="19"/>
  <rect class="cover c2" x="40" y="66"  width="340" height="19"/>
  <rect class="cover c3" x="40" y="86"  width="340" height="19"/>
  <rect class="cover c4" x="40" y="106" width="340" height="19"/>
  <rect class="cover c5" x="40" y="126" width="340" height="19"/>
  <rect class="cover c6" x="40" y="146" width="340" height="19"/>
  <rect class="cover c7" x="40" y="166" width="340" height="19"/>

  <!-- Cursor parpadeante -->
  <rect class="cursor" x="60" y="168" width="7" height="15"/>
</svg>
